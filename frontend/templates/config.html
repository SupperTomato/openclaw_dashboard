<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Configuration</title>
	<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
	<nav class="topnav">
		<a href="/">← Back to Dashboard</a>
		<h1>Configuration</h1>
	</nav>

	<main class="container">
		<div class="config-section">
			<h2>Dashboard Settings</h2>
			<textarea id="config-editor" class="config-editor">{{.Config}}</textarea>
			<div class="actions" style="margin-top: 16px;">
				<button onclick="saveConfig()">Save</button>
				<button onclick="resetConfig()">Reset</button>
			</div>
			<div id="status"></div>
		</div>

		<div class="help-section" style="margin-top: 40px;">
			<h3>Configuration Fields</h3>
			<table class="help-table">
				{{range .Descs}}
				<tr>
					<td><strong>{{.Lab}}</strong></td>
					<td>{{.Text}}</td>
				</tr>
				{{end}}
			</table>
		</div>
	</main>

	<script>
	function saveConfig() {
		var txt = document.getElementById('config-editor').value;
		try {
			JSON.parse(txt);
		} catch(e) {
			alert('Invalid JSON: ' + e.message);
			return;
		}
		fetch('/api/config/save', {
			method: 'POST',
			headers: {'Content-Type': 'application/json'},
			body: txt
		})
		.then(r => r.json())
		.then(d => {
			var el = document.getElementById('status');
			if (d.ok) {
				el.innerHTML = '<p style="color: green;">✓ Saved</p>';
				setTimeout(() => el.innerHTML = '', 3000);
			} else {
				el.innerHTML = '<p style="color: red;">✗ Error: ' + (d.err || 'Unknown error') + '</p>';
			}
		});
	}

	function resetConfig() {
		if (confirm('Reload config from file?')) {
			location.reload();
		}
	}
	</script>

	<style>
		.config-editor {
			width: 100%;
			min-height: 300px;
			font-family: monospace;
			font-size: 12px;
			padding: 12px;
			border: 1px solid #30363d;
			border-radius: 6px;
			background: #0d1117;
			color: #e6edf3;
		}
		.help-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
		.help-table td { padding: 8px; border-bottom: 1px solid #30363d; }
		.help-table strong { color: #58a6ff; }
	</style>
</body>
</html>
